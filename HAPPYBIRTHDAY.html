<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff5f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        .background-polaroids {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .polaroid {
            position: absolute;
            background: white;
            padding: 10px 10px 25px 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border-radius: 2px;
            opacity: 1;
            transition: opacity 0.5s;
        }

        .polaroid:hover { opacity: 0.9; }

        .polaroid img {
            display: block;
            width: 100%;
            height: auto;
            border: 1px solid #ddd;
        }

        #pol1 { width: 150px; top: 10vh; left: 5vw; transform: rotate(-10deg); }
        #pol2 { width: 180px; top: 15vh; right: 8vw; transform: rotate(15deg); }
        #pol3 { width: 140px; top: 40vh; left: 10vw; transform: rotate(8deg); }
        #pol4 { width: 170px; top: 55vh; right: 5vw; transform: rotate(-12deg); }
        #pol5 { width: 160px; top: 75vh; left: 15vw; transform: rotate(5deg); }
        #pol6 { width: 190px; top: 85vh; right: 12vw; transform: rotate(-18deg); }

        .container {
            margin-top: 8vh;
            z-index: 10;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 600px;
            position: relative;
        }

        h1 { color: #ff4d6d; font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 10px; }
        p { color: #555; font-size: 1.1rem; padding: 0 10px; }

        .btn {
            background: #ff4d6d;
            color: white;
            padding: 18px 35px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            animation: pulse 2s infinite;
            transition: transform 0.2s;
            margin: 20px 0;
            position: relative;
            z-index: 15;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn:active { transform: scale(0.95); }

        #photo-dropdown, #video-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 1.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s ease;
            opacity: 0;
            width: 90%;
            max-width: 900px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            margin-top: 30px;
            position: relative;
            z-index: 10;
        }

        #photo-dropdown.show, #video-section.show {
            max-height: 5000px;
            opacity: 1;
            padding: 25px 15px;
            margin-bottom: 30px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 15px;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: block;
        }

        video {
            width: 100%;
            max-width: 700px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .heart {
            position: fixed;
            color: #ffb3c1;
            font-size: 24px;
            animation: float 5s linear infinite;
            bottom: -30px;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        @media (max-width: 768px) {
            .container { width: 90%; padding: 20px; }
            h1 { font-size: 1.8rem; }
            .gallery { grid-template-columns: 1fr; }
            .polaroid { width: 100px !important; opacity: 0.4; } 
        }
    </style>
</head>
<body>

    <div class="background-polaroids">
        <div class="polaroid" id="pol1"><img src="pretty.jpg" alt="Solo 1"></div>
        <div class="polaroid" id="pol2"><img src="pretty2.jpg" alt="Solo 2"></div>
        <div class="polaroid" id="pol3"><img src="pretty3.jpg" alt="Solo 3"></div>
        <div class="polaroid" id="pol4"><img src="pretty4.jpg" alt="Solo 4"></div>
        <div class="polaroid" id="pol5"><img src="pretty5.jpg" alt="Solo 5"></div>
        <div class="polaroid" id="pol6"><img src="pretty6.jpg" alt="Solo 6"></div>
    </div>

    <div class="container">
        <h1>Happy Birthday, Bebe Ji Ho! 🥰</h1>
        <p>Sobrang napapagaan mo ang aking loob tuwing magkasama tayo.</p>
        <button class="btn" onclick="revealSurprise()">Click for a Surprise</button>
        <p id="secret-note" style="display:none; margin-top: 25px; font-style: italic; color: #ff4d6d; font-weight: bold;">
            "HAPPY BIRTHDAY BEBE, I LOVE YOU SO MUCH, HERE ARE SOME OF MY FAVE PICTURES OF OURS"
        </p>
    </div>

    <div id="photo-dropdown">
        <h2 style="color: #ff4d6d; font-family: 'Georgia', serif;">SOME OF OUR BEST MOMENTS ❤️</h2>
        <div class="gallery">
            <img src="jichons1.jpg" alt="Memory 1">
            <img src="jichons2.jpg" alt="Memory 2">
            <img src="jichons3.jpg" alt="Memory 3">
            <img src="jichons4.jpg" alt="Memory 4">
            <img src="jichons5.jpg" alt="Memory 5">
            <img src="jichons6.jpg" alt="Memory 6">
        </div>
        
        <h3 style="color: #555; margin-top: 30px;">Wait, there's more!</h3>
        <button class="btn" onclick="revealVideo()">CLICK MO TO BILI BILI HEHEHEHEHEHEHE 🎥</button>
    </div>

    <div id="video-section">
        <h2 style="color: #ff4d6d; font-family: 'Georgia', serif;">BARDAGULAN TIMEEEEEEEEE</h2>
        <video controls>
            <source src="friends_greeting.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <p style="margin-top: 20px; color: #888;">Mahal na mahal ka namin!</p>
    </div>

    <script>
        function revealSurprise() {
            document.getElementById('secret-note').style.display = 'block';
            const dropdown = document.getElementById('photo-dropdown');
            dropdown.classList.add('show');

            setTimeout(() => {
                dropdown.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 600);
        }

        function revealVideo() {
            const videoSec = document.getElementById('video-section');
            videoSec.classList.add('show');

            setTimeout(() => {
                videoSec.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 600);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        setInterval(createHeart, 400);
    </script>
</body>
</html>
